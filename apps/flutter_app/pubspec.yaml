name: flutter_app
description: "Client application for the Document Control System"
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  bloc: ^8.1.3
  flutter_bloc: ^8.1.3

  # Routing & Navigation
  go_router: ^13.2.0

  # Network HTTP Client
  dio: ^5.4.0

  # Local DB / Offline Cache
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Env configuration
  flutter_dotenv: ^5.1.0

  # Device & File Picker Utilities
  file_picker: ^6.1.1
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.3.3
  intl: ^0.19.0

  # Icon utility
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting rules
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - .env
